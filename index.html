<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Money Printer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hidden{
            display:none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="content">
        <div class="row">
            <h1>Money Printer</h1>
        </div>
        <div class="row">
            <h3>Cash:</h3>
            <h3 id="cash">$0</h3>
        </div>
        <button id="click"><img src="https://creazilla-store.fra1.digitaloceanspaces.com/cliparts/64946/cash-clipart-md.png" height="50" width="60"><br>Make Money</button>
        <div class="row">
            <h2>Business</h2>
        </div>
        <div class="row">
            <p class="hidden"></p>
        </div>
        <h4>Printer Cost: $50</h4>
        <br>
        <button id="moneyPrinter"><img src="https://cdn3.iconfinder.com/data/icons/unigrid-phantom-finance-vol-2/60/014_100_money_print_printer_frs_lifehack_seigniorage_dollar-512.png" height="50" width="60"><br>Buy Printer</button>
        <div class="row">
            <h3>Money Printer Count:</h3>
            <h3 id="printers"></h3>
        </div>
        <h2>Upgrades:</h2>
        <div class="row">
            <h4>Cost: $1000</h4>
            <button id="double"><img src="https://threshers.org/wp-content/uploads/2020/02/double-my-money-icon1.png" height="50" width="60"><br>Double Income</button>
        </div>
        <div class="row">
            <h4>Cost: $500</h4>
            <button id="twice"><img src="https://static.thenounproject.com/png/849840-200.png" height="50" width="60"><br>Double Efficiency</button>
        </div>
    </div>
</div>
<script>
    let cashAmount = 0;
    let increment = 1;
    let printerAmount = 0;
    let printerCost = 50;
    let printerSpeed = 10000;
    let speedCost = 500;
    let increaseSpeed = 1/2;
    let increaseCost = 1000;
    let increaseCash = 2;
    let income = increment;
    const cash = document.getElementById('cash');
    // const cashTag = document.getElementById('cashMoney');
    const clickButton = document.getElementById('click');
    const printerButton = document.getElementById('moneyPrinter');
    const printerCount = document.getElementById('printers');
    const error = document.querySelector('p');
    const increaseButton = document.getElementById('double');
    const increaseSpeedButton = document.getElementById('twice');


    clickButton.addEventListener('click', function(e){
        cashAmount += increment;
        cash.innerHTML = `$${cashAmount}`;
    });

    printerButton.addEventListener('click', function(e){
        if(cashAmount >= printerCost){
            cashAmount -= printerCost;
            cash.innerHTML = `$${cashAmount}`;
            printerAmount += 1;
            printerCount.innerHTML = `${printerAmount}`;
            setInterval(() => {
                document.getElementById("click").click();
            }, printerSpeed);
            error.classList.add('hidden');
        } else{
            error.classList.remove('hidden');
            error.textContent = "You Don't Have Enough Money For A Money Printer!";
            return;
        }
    });

    increaseButton.addEventListener('click', function(e){
        if(cashAmount >= increaseCost){
            cashAmount -= increaseCost;
            cash.innerHTML = `$${cashAmount}`;
            increment *= increaseCash;
            increaseButton.classList.add('hidden');
        } else {
            error.classList.remove('hidden');
            error.textContent = "You Don't Have Enough Money For Double Income!";
            return;
        }
    });

    increaseSpeedButton.addEventListener('click', function(e){
        if(cashAmount >= speedCost){
            cashAmount -= speedCost;
            cash.innerHTML = `$${cashAmount}`;
            printerSpeed *= increaseSpeed;
            increaseSpeedButton.classList.add('hidden');
        } else {
            error.classList.remove('hidden');
            error.textContent = "You Don't Have Enough Money For Double Efficiency!";
            return;
        }
    });


</script>
</body>
</html>
